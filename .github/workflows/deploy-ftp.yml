name: Deploy to Forpsi via FTP

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ftp-deploy-prod
  cancel-in-progress: false

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    name: FTP Deploy to Forpsi (medevid.cz)
    environment: medevid
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /www/
          protocol: ftps
          security: loose
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/_design-assets/**
            **/*.md
            **/.gitignore
            **/.editorconfig
            **/README*
            **/deploy-ftp.ps1
